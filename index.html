<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Информатор трамвая</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div class="app-container">
        <!-- Экран информационного табло -->
        <div id="displayScreen" class="screen active">
            
            <!-- Кнопка включения/выключения -->
            <div class="power-section">
                <button id="powerButton" class="power-button power-off">
                    <span class="power-icon">⏻</span>
                </button>
            </div>

            <!-- Информационное табло -->
            <div id="tramDisplay" class="tram-display disabled">
                
                <!-- Верхняя строка: дата и время -->
                <div class="top-bar">
                    <span id="currentDate" class="date">09.06.2026</span>
                    <span id="currentTime" class="time">14:30:45</span>
                </div>

                <!-- Основная информация -->
                <div class="main-info">
                    <div class="route-info">
                        <span id="routeNumber" class="route-number">--</span>
                        <span id="directionArrow" class="direction-arrow">→</span>
                    </div>
                    <span id="directionName" class="direction-name">Выберите маршрут</span>
                </div>

                <!-- Текущая остановка -->
                <div class="current-stop-section">
                    <span class="stop-label">ОСТАНОВКА</span>
                    <span id="currentStopName" class="current-stop">---</span>
                </div>

                <!-- Следующая остановка -->
                <div class="next-stop-section">
                    <span class="next-label">СЛЕДУЮЩАЯ</span>
                    <span id="nextStopName" class="next-stop">---</span>
                </div>

                <!-- Прогресс-бар -->
                <div class="progress-container">
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span id="stopCounter" class="stop-counter">0/0</span>
                </div>
            </div>

            <!-- Панель управления -->
            <div id="controlPanel" class="control-panel disabled">
                
                <!-- Выбор маршрута -->
                <div class="route-selector">
                    <select id="routeSelect" class="select-input">
                        <option value="">Выберите маршрут</option>
                    </select>
                    <select id="directionSelect" class="select-input" disabled>
                        <option value="">Выберите направление</option>
                    </select>
                </div>

                <!-- Кнопки управления -->
                <div class="controls-row">
                    <button id="prevButton" class="ctrl-btn nav-btn" disabled>
                        <span class="btn-icon">◀◀</span>
                    </button>
                    
                    <button id="playButton" class="ctrl-btn play-btn" disabled>
                        <span id="playIcon" class="btn-icon">▶</span>
                    </button>
                    
                    <button id="stopButton" class="ctrl-btn stop-btn" disabled>
                        <span class="btn-icon">■</span>
                    </button>
                    
                    <button id="nextButton" class="ctrl-btn nav-btn" disabled>
                        <span class="btn-icon">▶▶</span>
                    </button>
                </div>

                <!-- Дополнительные настройки -->
                <div class="settings-row">
                    <div class="volume-control">
                        <span class="volume-icon">🔈</span>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider">
                        <span class="volume-icon">🔊</span>
                    </div>
                    
                    <div class="mode-buttons">
                        <button id="autoButton" class="mode-btn">🔄 Авто</button>
                        <button id="repeatButton" class="mode-btn">🔁 Повтор</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Аудио плеер -->
    <audio id="audioPlayer" preload="auto"></audio>

    <!-- Служебная информация -->
    <div id="statusMessage" class="status-message"></div>

    <script src="app.js"></script>
</body>
</html>
